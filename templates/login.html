<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ParkBotix | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:radial-gradient(circle at 20%30%,#0a1f2a,#07161f); min-height:100vh; display:flex; align-items:center; justify-content:center; color:#fff; }
        .auth-container { background:rgba(0,0,0,0.5); backdrop-filter:blur(20px); border-radius:40px; padding:40px; width:90%; max-width:400px; border:1px solid rgba(255,255,255,0.2); }
        h1 { text-align:center; margin-bottom:30px; color:#FFD966; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:8px; font-weight:600; }
        input { width:100%; padding:12px 15px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); border-radius:30px; color:white; font-size:1rem; }
        button { width:100%; padding:12px; background:linear-gradient(135deg,#FFD966,#FFAA5E); border:none; border-radius:40px; color:#0b1a23; font-weight:700; font-size:1.1rem; cursor:pointer; transition:transform 0.2s; }
        button:hover { transform:scale(1.02); }
        .error { background:#d63031; padding:10px; border-radius:30px; margin-bottom:20px; text-align:center; }
        .footer { text-align:center; margin-top:20px; }
        .footer a { color:#FFD966; text-decoration:none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1><i class="fas fa-car-side"></i> ParkBotix</h1>
        <div id="error-message" class="error" style="display:none;"></div>
        <form id="login-form">
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="admin / user" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required></div>
            <button type="submit">Login</button>
        </form>
        <div class="footer">
            <p><a href="/forgot-password">Forgot Password?</a></p>
            <p>New user? <a href="/register">Register here</a></p>
            <p>Demo: admin/admin123 or user/user123</p>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) window.location.href = '/dashboard';
                else { errorDiv.textContent = data.error || 'Login failed'; errorDiv.style.display = 'block'; }
            } catch(err) { errorDiv.textContent = 'Network error'; errorDiv.style.display = 'block'; }
        });
    </script>
</body>
</html>
