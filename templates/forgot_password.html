<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkBotix | Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a1f2a, #07161f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .auth-container {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; margin-bottom: 30px; color: #FFD966; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FFD966, #FFAA5E);
            border: none;
            border-radius: 40px;
            color: #0b1a23;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .message { padding: 10px; border-radius: 30px; margin-bottom: 20px; text-align: center; }
        .error { background: #d63031; }
        .success { background: #00B894; }
        .step { display: none; }
        .step.active { display: block; }
        .footer { text-align: center; margin-top: 20px; }
        .footer a { color: #FFD966; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1><i class="fas fa-key"></i> Forgot Password</h1>
        <div id="message" class="message" style="display:none;"></div>

        <div id="step1" class="step active">
            <div class="form-group"><label>Registered Mobile Number</label><input type="tel" id="mobile" placeholder="10-digit mobile" required></div>
            <button id="send-otp-btn">Send OTP</button>
        </div>
        <div id="step2" class="step">
            <div class="form-group"><label>OTP</label><input type="text" id="otp" placeholder="6-digit OTP" required></div>
            <button id="verify-otp-btn">Verify OTP</button>
            <button id="resend-otp-btn">Resend OTP</button>
        </div>
        <div id="step3" class="step">
            <div class="form-group"><label>New Password</label><input type="password" id="new_password" required></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm_password" required></div>
            <button id="reset-password-btn">Reset Password</button>
        </div>
        <div class="footer"><p><a href="/login">Back to Login</a></p></div>
    </div>

    <script>
        let resetToken = null, currentMobile = null;
        function showMessage(text, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${isError ? 'error' : 'success'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 5000);
        }
        function showStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
        }
        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            const mobile = document.getElementById('mobile').value.trim();
            if (!mobile.match(/^[6-9]\d{9}$/)) { showMessage('Enter valid 10-digit mobile'); return; }
            currentMobile = mobile;
            try {
                const res = await fetch('/api/forgot-password', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mobile }) });
                const data = await res.json();
                if (res.ok) { showMessage('OTP sent', false); showStep(2); }
                else showMessage(data.error);
            } catch { showMessage('Network error'); }
        });
        document.getElementById('resend-otp-btn').addEventListener('click', async () => {
            if (!currentMobile) { showMessage('Enter mobile first'); return; }
            const res = await fetch('/api/forgot-password', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mobile: currentMobile }) });
            if (res.ok) showMessage('OTP resent', false);
            else showMessage('Failed');
        });
        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const otp = document.getElementById('otp').value.trim();
            if (!otp || otp.length !== 6) { showMessage('Enter 6-digit OTP'); return; }
            try {
                const res = await fetch('/api/verify-otp', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mobile: currentMobile, otp }) });
                const data = await res.json();
                if (res.ok) { resetToken = data.reset_token; showMessage('OTP verified', false); showStep(3); }
                else showMessage(data.error);
            } catch { showMessage('Network error'); }
        });
        document.getElementById('reset-password-btn').addEventListener('click', async () => {
            const newPass = document.getElementById('new_password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            if (!newPass || !confirmPass) { showMessage('Fill both fields'); return; }
            if (newPass !== confirmPass) { showMessage('Passwords do not match'); return; }
            if (newPass.length < 4) { showMessage('Password must be at least 4 characters'); return; }
            try {
                const res = await fetch('/api/reset-password', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ reset_token: resetToken, new_password: newPass }) });
                if (res.ok) { showMessage('Password reset! Redirecting...', false); setTimeout(() => window.location.href = '/login', 2000); }
                else { const data = await res.json(); showMessage(data.error); }
            } catch { showMessage('Network error'); }
        });
    </script>
</body>
</html>
